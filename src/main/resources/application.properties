# ========================================
# Spring Boot Application Configuration
# ========================================
# Supports both local development and Railway production deployments
# Environment variables override defaults (see values after colons)

# Server Configuration
# - Local: Uses port 8080 by default
# - Railway: Injects PORT environment variable automatically
server.port=${PORT:8080}

# Database Connection Configuration
# These environment variables MUST be set for the application to connect to a database
#
# LOCAL DEVELOPMENT EXAMPLE:
#   $env:BAZAAR_DB_URL = "jdbc:mysql://localhost:3306/bazaar_tracker"
#   $env:BAZAAR_DB_USERNAME = "root"
#   $env:BAZAAR_DB_PASSWORD = "your_local_password"
#
# RAILWAY PRODUCTION EXAMPLE (set in Railway console):
#   BAZAAR_DB_URL = "jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
#   BAZAAR_DB_USERNAME = "root"
#   BAZAAR_DB_PASSWORD = "[generated by Railway MySQL service]"
#
# NOTE: Defaults below are for local development only
#       Railway MUST explicitly set variables in Java Service Environment Variables section

# JDBC connection string to MySQL database
# Format: jdbc:mysql://HOST:PORT/DATABASE[?options]
# For Railway: Use mysql.railway.internal as host (internal-only address)
# Query parameters are REQUIRED for Railway: ?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
bazaar.db.url=${BAZAAR_DB_URL:jdbc:mysql://localhost:3306/bazaar_tracker}

# Database username (typically 'root' for both local and Railway)
bazaar.db.username=${BAZAAR_DB_USERNAME:root}

# Database password
# For local: Enter your local MySQL password
# For Railway: Copy from MySQL service's MYSQL_PASSWORD variable
bazaar.db.password=${BAZAAR_DB_PASSWORD:changeme}

# CORS origins for API access (comma-separated)
# Local default allows Vite dev server; Railway can override with frontend URL(s)
# Example: BAZAAR_CORS_ALLOWED_ORIGINS=https://your-frontend.up.railway.app,http://localhost:5173
bazaar.cors.allowed-origins=${BAZAAR_CORS_ALLOWED_ORIGINS:http://localhost:5173}
